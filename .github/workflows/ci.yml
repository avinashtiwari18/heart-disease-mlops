name: Heart Disease MLOps CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  lint-test-train:
    name: Lint, Test & Train
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src api tests scripts --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src api tests scripts --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Download dataset
        run: python scripts/download_data.py

      - name: Unit tests (pre-train)
        run: |
          pytest tests/test_data_processing.py tests/test_model.py -v --cov=src --cov-report=term-missing

      - name: Train models with MLflow tracking
        run: |
          python -m src.eda
          python -m src.train

      - name: Unit tests (including API)
        run: |
          pytest tests -v --cov=src --cov=api --cov-report=xml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-and-metrics
          path: |
            models/
            artifacts/metrics/
            artifacts/eda/
            mlflow_tracking/
          if-no-files-found: error

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-test-train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-and-metrics

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t heart-disease-api:ci .

      - name: Run container and smoke-test /predict
        run: |
          docker run -d --name hd-api -p 8000:8000 heart-disease-api:ci
          sleep 8
          curl -fsS http://127.0.0.1:8000/health
          curl -fsS -X POST http://127.0.0.1:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"age":63,"sex":1,"cp":3,"trestbps":145,"chol":233,"fbs":1,"restecg":0,"thalach":150,"exang":0,"oldpeak":2.3,"slope":0,"ca":0,"thal":1}'
          docker logs hd-api
          docker stop hd-api
