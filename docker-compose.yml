version: "3.9"

services:
  heart-disease-api:
    build: .
    image: heart-disease-api:1.0.0
    container_name: heart-disease-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/heart_disease_pipeline.joblib
    volumes:
      - ./artifacts/logs:/app/artifacts/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional local monitoring stack
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: heart-disease-prometheus
    volumes:
      - ./k8s/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - heart-disease-api
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:11.1.4
    container_name: heart-disease-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    profiles: ["monitoring"]
